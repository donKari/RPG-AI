<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magie & Dragons • Éveil des Rêves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="de.css">
    
    <script src="themes.js"></script>
    <style>
        /* Styles spécifiques à la gestion du chat */
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--col-border); border-radius: 2px; }
        .chat-bubble { transition: all 0.3s ease; }
        
        /* Animation de pulsation pour le chargement du MJ */
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .loading-pulse { animation: pulse 1.5s infinite; }
    </style>
</head>

<body class="theme-sorcier text-white min-h-screen overflow-hidden">

    <div id="bg-layer">
        <div class="desert-bg">
            <div class="desert-sky"></div>
            <div class="desert-grain"></div>
            <div class="sand-wind">
                <div class="wind-streak"></div><div class="wind-streak"></div><div class="wind-streak"></div>
                <div class="wind-streak"></div><div class="wind-streak"></div><div class="wind-streak"></div>
                <div class="wind-streak"></div><div class="wind-streak"></div><div class="wind-streak"></div>
            </div>
            <div class="dune dune-3"></div>
            <div class="dune dune-2"></div>
            <div class="dune dune-1"></div>
            <div class="heat-haze"></div>
        </div>

        <div class="foret-bg">
            <div class="foret-sky"></div>
            <div class="god-rays">
                <div class="ray"></div><div class="ray"></div><div class="ray"></div>
            </div>
            <div class="leaves-layer">
                <div class="leaf">🍃</div><div class="leaf">🌿</div><div class="leaf">🍂</div>
            </div>
            <div class="forest-mist">
                <div class="mist-cloud"></div><div class="mist-cloud"></div>
            </div>
        </div>

        <div class="chateau-bg">
            <div class="chateau-sky"></div>
            <div class="shadow-veil"></div>
            <div class="castle-silhouette"></div>
            <div class="lightning-layer">
                <div class="lightning-flash"></div><div class="lightning-flash"></div>
            </div>
        </div>

        <div class="sorcier-bg">
            <div class="sorcier-sky"></div>
            <div class="rune-layer">
                <div class="rune-circle"></div><div class="rune-circle"></div>
            </div>
            <div class="magic-flux">
                <div class="flux-line"></div><div class="flux-line"></div>
            </div>
            <div class="magic-aura"></div>
        </div>
    </div>

    <div class="relative z-10 flex flex-col h-screen">
        <header class="border-b py-4 px-6 flex items-center justify-between backdrop-blur-md"
                style="background: var(--col-header-bg); border-color: var(--col-border);">
            <div class="flex items-center gap-6 flex-wrap">
                <div class="flex items-center gap-4">
                    <span id="header-icon" class="text-4xl">✨</span>
                    <div>
                        <h1 class="rune-font text-4xl tracking-widest magic-glow">Magie & Dragons</h1>
                        <p class="text-sm" style="color: var(--col-text-secondary);">L'IA devient ton Maître du Jeu</p>
                    </div>
                </div>

                <div id="theme-band" class="flex gap-2">
                    <button class="theme-btn" onclick="setTheme('foret', this)">🌿 Forêt</button>
                    <button class="theme-btn" onclick="setTheme('desert', this)">🏜️ Désert</button>
                    <button class="theme-btn" onclick="setTheme('chateau', this)">🏰 Château</button>
                    <button class="theme-btn active" onclick="setTheme('sorcier', this)">✨ Sorcier</button>
                </div>
            </div>

            <button onclick="history.back()" 
                    class="px-6 py-2 rounded-xl text-sm transition font-bold"
                    style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                ← Quitter
            </button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-80 sidebar border-r p-6 overflow-y-auto flex flex-col" style="border-color: var(--col-border);">
                <h3 class="text-2xl font-bold mb-6 text-accent">Aventure</h3>
                <button onclick="openCharacterCreationModal()"
                        class="w-full py-5 rounded-2xl font-bold text-lg transition mb-8 shadow-lg"
                        style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                    👤 Mon Personnage
                </button>
                
                <div class="mt-auto pt-6 border-t border-white/10">
                    <h4 class="mb-3 text-sm opacity-50 uppercase tracking-widest">Actions Rapides</h4>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <button onclick="quickAction('J\'explore les environs')" class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Explorer</button>
                        <button onclick="quickAction('Je lance un sortilège')" class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Sortilège</button>
                        <button onclick="quickAction('J\'attaque l\'ennemi')" class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Attaquer</button>
                        <button onclick="quickAction('Je fouille la zone')" class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Fouiller</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col relative">
                <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 pb-24"></div>
                
                <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/90 to-transparent">
                    <div class="max-w-4xl mx-auto flex gap-3">
                        <input id="user-input" type="text" placeholder="Décris ton action au Maître du Jeu..."
                               class="flex-1 rounded-full px-8 py-5 text-lg border focus:outline-none bg-slate-900/80 border-white/10 shadow-2xl">
                        <button onclick="sendMessage()" 
                                class="px-12 rounded-full font-bold text-lg transition-transform active:scale-95 shadow-xl"
                                style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                            Envoyer
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-72 sidebar border-l p-6 overflow-y-auto" style="border-color: var(--col-border);">
                <h3 class="text-xl font-bold mb-4 text-accent">Fiche de Héros</h3>
                <div id="character-info" class="space-y-6">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { rollDice, detectStatFromAction, showDiceAnimation, shouldRoll } from './de.js';

        // Initialisation des thèmes
        injectThemeStyles();

        // Config API
        const GROQ_API_KEY = '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';
        
        // Variables Globales
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        window.conversationHistory = [];
        window.currentCharacter = JSON.parse(localStorage.getItem('currentCharacter')) || null;

        // Affichage des messages
        window.addMessage = function(text, isGM) {
            const div = document.createElement('div');
            div.className = `max-w-2xl ${isGM ? 'mr-auto bg-slate-800/60' : 'ml-auto bg-violet-950/60'} p-6 rounded-3xl border border-white/5 shadow-lg backdrop-blur-sm`;
            div.innerHTML = `
                <div class="text-xs mb-2 opacity-50 flex items-center gap-2">
                    ${isGM ? '🧙 <span class="uppercase tracking-tighter">Maître du Jeu</span>' : '⚔️ <span class="uppercase tracking-tighter">Toi</span>'}
                </div>
                <div class="leading-relaxed text-slate-100">${text}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        // Gestion du chargement
        function showLoading() {
            const div = document.createElement('div');
            div.id = "mj-loading";
            div.className = "mr-auto bg-slate-800/40 p-4 rounded-2xl loading-pulse text-sm opacity-70 italic";
            div.innerHTML = "🧙 Le Maître du Jeu tisse les fils du destin...";
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // --- LOGIQUE D'ENVOI ---
        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if (!text) return;

            // On affiche le message du joueur
            addMessage(text, false);
            userInput.value = '';

            let systemContext = "";

            // LOGIQUE DE DÉ (Conditionnelle et Rare)
            if (window.currentCharacter && shouldRoll(text)) {
                const stat = detectStatFromAction(text);
                const result = rollDice(stat, window.currentCharacter);
                
                // On lance l'animation visuelle longue de de.js
                showDiceAnimation(`${result.resultType} (${result.total})`);
                
                // On prépare le contexte pour l'IA
                systemContext = `\n[CONTEXTE SYSTÈME : Le joueur tente une action liée à ${stat}. Le dé a donné un total de ${result.total}. Résultat : ${result.resultType}. Intègre cet échec ou cette réussite dans ta réponse.]`;
                
                // On attend que l'animation de de.js soit bien entamée (2s) avant de déclencher l'IA
                setTimeout(() => callGM(text + systemContext), 2000);
            } else {
                // Envoi classique sans dé
                await callGM(text);
            }
        };

        // Appel API Groq
        window.callGM = async function(content) {
            const loader = showLoading();
            window.conversationHistory.push({ role: "user", content: content });

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${GROQ_API_KEY}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Tu es un Maître du Jeu expert en Dark Fantasy. Style immersif, descriptif et sans censure. Réponds en français." },
                            ...window.conversationHistory
                        ],
                        temperature: 0.85
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                loader.remove();
                addMessage(reply, true);
                window.conversationHistory.push({ role: "assistant", content: reply });
            } catch (err) {
                loader.remove();
                addMessage("❌ Une interférence magique a coupé le lien avec le MJ.", true);
            }
        };

        // Actions rapides
        window.quickAction = function(text) {
            userInput.value = text;
            sendMessage();
        };

        // Mise à jour de l'affichage du perso (appelée par character-creation.js)
        window.updateMainPageWithCharacter = function(character) {
            window.currentCharacter = character;
            const info = document.getElementById('character-info');
            if(!info) return;

            info.innerHTML = `
                <div class="p-5 rounded-2xl bg-white/5 border border-white/10">
                    <div class="text-xl font-bold magic-glow mb-1">${character.name}</div>
                    <div class="text-sm opacity-60 mb-4">${character.race} ${character.class}</div>
                    
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between"><span>❤️ Vie</span><span class="font-mono text-red-400">${character.hp}/${character.maxHp}</span></div>
                        <div class="flex justify-between"><span>⚔️ Force</span><span class="font-mono">${character.stats.force}</span></div>
                        <div class="flex justify-between"><span>🏹 Dex</span><span class="font-mono">${character.stats.dexterite}</span></div>
                        <div class="flex justify-between"><span>✨ Int</span><span class="font-mono">${character.stats.intelligence}</span></div>
                        <div class="flex justify-between"><span>🛡️ Def</span><span class="font-mono">${character.stats.defense}</span></div>
                    </div>
                </div>
            `;
        };

        // Initialisation au chargement
        window.onload = () => {
            if (window.currentCharacter) {
                updateMainPageWithCharacter(window.currentCharacter);
                addMessage(`Ravi de te revoir, **${window.currentCharacter.name}**. Où en étions-nous dans ton périple ?`, true);
            } else {
                addMessage("Bienvenue dans les Terres d'Éveil. Crée ton héros à gauche pour débuter l'aventure.", true);
            }
        };

        // Enter pour envoyer
        userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    </script>

    <script src="character-creation.js"></script>
</body>
</html>
