<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magie & Dragons • Éveil des Rêves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <script src="themes.js"></script>
    <style>
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--col-border); border-radius: 2px; }
    </style>
</head>

<body class="theme-sorcier text-white min-h-screen">

    <!-- ═══════════ COUCHE DE FOND ═══════════ -->
    <div id="bg-layer">
        <div class="desert-bg">
            <div class="desert-sky"></div><div class="desert-grain"></div>
            <div class="sand-wind">
                <div class="wind-streak"></div><div class="wind-streak"></div><div class="wind-streak"></div>
                <div class="wind-streak"></div><div class="wind-streak"></div><div class="wind-streak"></div>
                <div class="wind-streak"></div><div class="wind-streak"></div><div class="wind-streak"></div>
                <div class="wind-streak"></div>
            </div>
            <div class="dune dune-3"></div><div class="dune dune-2"></div><div class="dune dune-1"></div>
            <div class="heat-haze"></div>
        </div>
        <div class="foret-bg">
            <div class="foret-sky"></div>
            <div class="god-rays">
                <div class="ray"></div><div class="ray"></div><div class="ray"></div>
                <div class="ray"></div><div class="ray"></div><div class="ray"></div>
            </div>
            <div class="leaves-layer">
                <div class="leaf">🍃</div><div class="leaf">🌿</div><div class="leaf">🍂</div>
                <div class="leaf">🍃</div><div class="leaf">🌿</div><div class="leaf">🍃</div>
                <div class="leaf">🍂</div><div class="leaf">🍃</div><div class="leaf">🌿</div><div class="leaf">🍃</div>
            </div>
            <div class="forest-mist">
                <div class="mist-cloud"></div><div class="mist-cloud"></div><div class="mist-cloud"></div>
            </div>
        </div>
        <div class="chateau-bg">
            <div class="chateau-sky"></div>
            <div class="shadow-veil"></div><div class="shadow-veil"></div><div class="shadow-veil"></div>
            <div class="castle-silhouette"></div>
            <div class="chateau-mist">
                <div class="mist-strip"></div><div class="mist-strip"></div>
                <div class="mist-strip"></div><div class="mist-strip"></div>
            </div>
            <div class="lightning-layer">
                <div class="lightning-flash"></div><div class="lightning-flash"></div><div class="lightning-flash"></div>
            </div>
        </div>
        <div class="sorcier-bg">
            <div class="sorcier-sky"></div>
            <div class="rune-layer">
                <div class="rune-circle"></div><div class="rune-circle"></div><div class="rune-circle"></div>
            </div>
            <div class="magic-flux">
                <div class="flux-line"></div><div class="flux-line"></div>
                <div class="flux-line"></div><div class="flux-line"></div>
            </div>
            <div class="sparks-layer">
                <div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
                <div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
                <div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
            </div>
            <div class="magic-aura"></div>
        </div>
    </div>

    <div class="relative z-10 flex flex-col h-screen">

        <!-- ═══════════ HEADER ═══════════ -->
        <header class="border-b py-4 px-6 flex items-center justify-between backdrop-blur-md"
                style="background: var(--col-header-bg); border-color: var(--col-border);">
            <div class="flex items-center gap-6 flex-wrap">
                <div class="flex items-center gap-4">
                    <span id="header-icon" class="text-4xl">✨</span>
                    <div>
                        <h1 class="rune-font text-4xl tracking-widest magic-glow">Magie & Dragons</h1>
                        <p class="text-sm" style="color: var(--col-text-secondary);">Crée ton scénario • L'IA devient ton Maître du Jeu</p>
                    </div>
                </div>
                <div id="theme-band">
                    <button class="theme-btn" onclick="setTheme('foret', this)">🌿 Forêt Magique</button>
                    <button class="theme-btn" onclick="setTheme('desert', this)">🏜️ Désert Apocalypse</button>
                    <button class="theme-btn" onclick="setTheme('chateau', this)">🏰 Château Hanté</button>
                    <button class="theme-btn active" onclick="setTheme('sorcier', this)">✨ Sorcier & Magie</button>
                </div>
            </div>
            <button onclick="history.back()"
                    class="px-6 py-2 rounded-xl text-sm transition"
                    style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                ← Retour
            </button>
        </header>

        <div class="flex flex-1 overflow-hidden">

            <!-- ═══════════ SIDEBAR GAUCHE ═══════════ -->
            <div class="w-80 sidebar border-r p-6 overflow-y-auto flex flex-col gap-6" style="border-color: var(--col-border);">

                <!-- Création personnage -->
                <div>
                    <h3 class="text-2xl font-bold mb-4" style="color: var(--col-text-accent);">Personnage</h3>
                    <button onclick="openCharacterCreationModal()"
                            class="w-full py-4 rounded-2xl font-bold text-base transition"
                            style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                        👤 Créer mon Personnage
                    </button>
                </div>

                <!-- État du monde -->
                <div id="world-state-panel" class="hidden">
                    <h4 class="text-sm font-bold mb-3" style="color: var(--col-text-secondary);">🗺️ État du Monde</h4>
                    <div class="rounded-xl p-4 space-y-2 text-sm" style="background: rgba(15,23,42,0.7); border: 1px solid var(--col-border);">
                        <div class="flex items-center gap-2">
                            <span>📍</span><span id="ws-location" class="text-white/80">—</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="ws-situation-icon">⚙️</span>
                            <span id="ws-situation" class="text-white/80">—</span>
                        </div>
                        <div class="flex items-start gap-2">
                            <span>📜</span>
                            <span id="ws-event" class="text-white/60 text-xs leading-relaxed">—</span>
                        </div>
                    </div>
                </div>

                <!-- Barre XP -->
                <div id="xp-panel" class="hidden">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="text-sm font-bold" style="color: var(--col-text-secondary);">✨ Expérience</h4>
                        <span id="xp-level" class="text-xs font-mono px-2 py-0.5 rounded-full"
                              style="background:rgba(168,85,247,0.2);color:#c084fc;">Niv. 1</span>
                    </div>
                    <div class="h-2 rounded-full overflow-hidden" style="background:rgba(30,30,60,0.8);border:1px solid var(--col-border);">
                        <div id="xp-bar" class="h-full rounded-full transition-all duration-700"
                             style="width:0%;background:linear-gradient(to right,#a855f7,#6366f1);">
                        </div>
                    </div>
                    <p id="xp-text" class="text-xs mt-1 text-right font-mono" style="color:#a78bfa;">0 / 100 XP</p>
                </div>

            </div>

            <!-- ═══════════ CHAT CENTRAL ═══════════ -->
            <div class="flex-1 flex flex-col min-w-0">
                <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

                <div class="border-t p-5" style="border-color: var(--col-border); background: rgba(0,0,0,0.85);">
                    <div class="max-w-3xl mx-auto flex gap-3">
                        <input id="user-input" type="text"
                               placeholder="Décris ton action ou clique sur un choix…"
                               class="flex-1 rounded-3xl px-6 py-4 text-lg border focus:outline-none"
                               style="background: rgba(15,23,42,0.85); border-color: var(--col-border);">
                        <button onclick="sendMessage()"
                                class="px-10 rounded-3xl font-bold text-lg transition"
                                style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                            Envoyer
                        </button>
                    </div>
                </div>
            </div>

            <!-- ═══════════ SIDEBAR DROITE ═══════════ -->
            <div class="w-72 sidebar border-l p-5 overflow-y-auto flex flex-col gap-5" style="border-color: var(--col-border);">

                <!-- Stats personnage -->
                <div>
                    <h3 class="text-lg font-bold mb-3" style="color: var(--col-text-accent);">Ton Personnage</h3>
                    <div id="character-info"></div>
                </div>

                <!-- Barre ennemi -->
                <div id="enemy-bar-container"></div>

                <!-- Choix (copie sidebar) -->
                <div>
                    <h4 class="text-xs font-bold mb-2" style="color: var(--col-text-secondary);">🎲 Actions</h4>
                    <div id="choices-container"></div>
                    <p id="choices-hint" class="text-xs mt-2 text-center" style="color: var(--col-text-secondary);">
                        Les actions apparaîtront après chaque réponse du MJ
                    </p>
                </div>

                <!-- Inventaire interactif -->
                <div>
                    <h4 class="text-xs font-bold mb-2" style="color: var(--col-text-secondary);">🎒 Inventaire</h4>
                    <div id="inventory-panel">
                        <p style="color:#64748b;font-size:0.82rem;text-align:center;padding:8px;">Inventaire vide</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ═══════════ SCRIPTS ═══════════ -->
    <script>
        injectThemeStyles();

        // ── Config API ──
        const API_PROVIDER = 'groq';
        let GROQ_API_KEY = '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';

        // ── Variables globales ──
        const chatContainer = document.getElementById('chat-container');
        const userInput     = document.getElementById('user-input');
        let conversationHistory = [];
        let currentScenario     = '';
        let currentCharacter    = null;

        // ── Messages ──
        function addMessage(text, isGM) {
            const div = document.createElement('div');
            div.className = `max-w-2xl ${isGM ? 'mr-auto chat-bubble-gm' : 'ml-auto chat-bubble-player'} p-5 rounded-3xl`;
            div.innerHTML = `
                <div style="color:${isGM ? 'var(--col-text-secondary)' : 'var(--col-accent)'};font-size:0.8rem;margin-bottom:6px;">
                    ${isGM ? '🧙 Maître du Jeu' : '⚔️ Toi'}
                </div>
                <p class="leading-relaxed whitespace-pre-wrap" style="color:#f1f5f9;">${text}</p>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            const loading = document.createElement('div');
            loading.id = 'loading-msg';
            loading.className = 'max-w-2xl mr-auto chat-bubble-gm p-5 rounded-3xl';
            loading.innerHTML = `<p style="color:var(--col-text-secondary);animation:pulse 1.5s infinite;">🧙 Le Maître du Jeu tisse la trame…</p>`;
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return loading;
        }

        // ── Personnage ──
        function updateMainPageWithCharacter(character) {
            currentCharacter  = character;
            gameState.player  = { hp: character.hp, maxHp: character.maxHp };

            const container = document.getElementById('character-info');
            if (!container) return;
            const stats = character.stats || {};

            container.innerHTML = `
                <div class="rounded-3xl p-5" style="background:rgba(15,23,42,0.88);border:2px solid var(--col-border);">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center text-2xl shadow-lg">👤</div>
                        <div>
                            <h2 class="text-xl font-bold magic-glow">${character.name}</h2>
                            <p class="text-violet-300 text-sm">${character.race} • ${character.class}</p>
                        </div>
                    </div>

                    <!-- HP -->
                    <div class="mb-4">
                        <div class="flex justify-between text-xs mb-1">
                            <span style="color:#f87171;">❤️ Points de Vie</span>
                            <span id="hp-text" class="font-mono">${character.hp} / ${character.maxHp}</span>
                        </div>
                        <div class="h-2.5 bg-zinc-900 rounded-full overflow-hidden border border-red-900/40">
                            <div id="hp-bar"
                                 class="h-full bg-gradient-to-r from-rose-500 to-pink-600 rounded-full transition-all duration-500"
                                 style="width:${Math.max(0,(character.hp/character.maxHp)*100)}%;">
                            </div>
                        </div>
                    </div>

                    <!-- Stats 2×2 -->
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div class="bg-[#1e2937] rounded-xl p-3">
                            <div class="text-red-400 text-xs mb-1">⚔️ Force</div>
                            <div class="text-2xl font-bold font-mono">${stats.force || 10}</div>
                        </div>
                        <div class="bg-[#1e2937] rounded-xl p-3">
                            <div class="text-blue-400 text-xs mb-1">🛡️ Défense</div>
                            <div class="text-2xl font-bold font-mono">${stats.defense || 10}</div>
                        </div>
                        <div class="bg-[#1e2937] rounded-xl p-3">
                            <div class="text-emerald-400 text-xs mb-1">🏹 Dextérité</div>
                            <div class="text-2xl font-bold font-mono">${stats.dexterite || 10}</div>
                        </div>
                        <div class="bg-[#1e2937] rounded-xl p-3">
                            <div class="text-purple-400 text-xs mb-1">✨ Intel.</div>
                            <div class="text-2xl font-bold font-mono">${stats.intelligence || 10}</div>
                        </div>
                    </div>

                    ${character.background && character.background !== 'Aucun background renseigné' ? `
                    <div class="mt-4 pt-3 border-t border-[var(--col-border)] text-xs leading-relaxed" style="color:var(--col-text-secondary);">
                        ${character.background}
                    </div>` : ''}
                </div>
            `;

            // Révéler les panneaux cachés
            ['world-state-panel','xp-panel'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('hidden');
            });

            updateXPBar();
            renderInventory();
            updateWorldStatePanel();
        }

        // ── Panneau état du monde ──
        function updateWorldStatePanel() {
            const icons = { 'Combat':'⚔️', 'Calme':'🌙', 'Exploration':'🔭', 'Dialogue':'💬', 'Danger':'⚠️' };
            const loc  = document.getElementById('ws-location');
            const sit  = document.getElementById('ws-situation');
            const icon = document.getElementById('ws-situation-icon');
            const evt  = document.getElementById('ws-event');
            if (loc)  loc.textContent  = gameState.location;
            if (sit)  sit.textContent  = gameState.situation;
            if (icon) icon.textContent = icons[gameState.situation] || '⚙️';
            if (evt)  evt.textContent  = gameState.lastEvent;
        }

        // ── Démarrage scénario ──
        async function startNewScenario() {
            const scenarioText = document.getElementById('scenario-input')?.value.trim();
            if (!scenarioText) { alert('Crée ton personnage avant de lancer l\'aventure !'); return; }

            currentScenario = scenarioText;
            conversationHistory = [];
            chatContainer.innerHTML = '';

            gameState.location  = 'Lieu de départ';
            gameState.situation = 'Calme';
            gameState.enemy     = null;
            gameState.inventory = [];
            gameState.lastEvent = 'Début de l\'aventure';
            gameState.turn      = 0;
            saveGameState();

            const saved = localStorage.getItem('currentCharacter');
            if (saved) updateMainPageWithCharacter(JSON.parse(saved));

            renderInventory();
            renderEnemyBar();
            updateXPBar();

            addMessage(`<strong>Aventure débutée :</strong> ${scenarioText}`, false);
            await callGM(`Lance immédiatement l'aventure avec une introduction immersive de 4 à 5 phrases. Le joueur incarne ${scenarioText}. Réponds en JSON structuré.`);
        }

        // ── Envoi message libre ──
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || playerIsDead) return;
            addMessage(text, false);
            conversationHistory.push({ role: 'user', content: text });
            userInput.value = '';
            await callGM();
        }

        // ── Init ──
        window.onload = () => {
            loadGameState();
            addMessage('Bienvenue dans <strong>Magie & Dragons</strong> ✨<br>Crée ton personnage à gauche pour commencer l\'aventure !', true);
        };

        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

    <!-- Game Engine v3.0 -->
    <script src="game-engine.js"></script>

    <!-- Modal création personnage -->
    <script src="character-creation.js"></script>
</body>
</html>
