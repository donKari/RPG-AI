<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magie & Dragons • Éveil des Rêves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <script src="themes.js"></script>
    <style>
        /* Styles spécifiques à cette page uniquement */
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--col-border); border-radius: 2px; }

        /* Bonus : animation choix */
        @keyframes choicePop {
            0% { opacity: 0; transform: translateY(12px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .choice-btn {
            animation: choicePop 0.4s ease backwards;
        }
    </style>
</head>
<body class="theme-sorcier text-white min-h-screen">
    <!-- COUCHE DE FOND (inchangée) -->
    <div id="bg-layer">
        <!-- Désert / Forêt / Château / Sorcier (identique) -->
        <div class="desert-bg"> ... </div>
        <div class="foret-bg"> ... </div>
        <div class="chateau-bg"> ... </div>
        <div class="sorcier-bg"> ... </div>
    </div>

    <div class="relative z-10 flex flex-col h-screen">
        <!-- Header (inchangé) -->
        <header class="border-b py-4 px-6 flex items-center justify-between backdrop-blur-md"
                style="background: var(--col-header-bg); border-color: var(--col-border);">
            <!-- ... identique ... -->
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar gauche (inchangée) -->
            <div class="w-80 sidebar border-r p-6 overflow-y-auto flex flex-col" style="border-color: var(--col-border);">
                <!-- ... identique ... -->
            </div>

            <!-- Chat central (inchangé) -->
            <div class="flex-1 flex flex-col">
                <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
               
                <div class="border-t p-6" style="border-color: var(--col-border); background: rgba(0,0,0,0.85);">
                    <div class="max-w-3xl mx-auto flex gap-3">
                        <input id="user-input" type="text" placeholder="Que fais-tu maintenant ? (ou clique sur un choix ci-dessous)"
                               class="flex-1 rounded-3xl px-6 py-4 text-lg border focus:outline-none"
                               style="background: rgba(15,23,42,0.85); border-color: var(--col-border);">
                        <button onclick="sendMessage()"
                                class="px-10 rounded-3xl font-bold text-lg transition"
                                style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
                            Envoyer
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sidebar droite : ACTIONS RAPIDES → CHOIX DYNAMIQUES -->
            <div class="w-72 sidebar border-l p-6 overflow-y-auto" style="border-color: var(--col-border);">
                <h3 class="text-xl font-bold mb-4" style="color: var(--col-text-accent);">Ton Personnage</h3>
                <div id="character-info" class="space-y-6"></div>
               
                <div class="mt-10 pt-6 border-t" style="border-color: var(--col-border);">
                    <h4 id="choices-title" class="mb-3 text-sm" style="color: var(--col-text-secondary);">Choix du Maître du Jeu</h4>
                    <div id="quick-actions-grid" class="grid grid-cols-2 gap-3 text-sm">
                        <!-- Boutons dynamiques injectés ici par renderDynamicChoices() -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // ==================== INJECTION THÈMES (inchangé) ====================
        injectThemeStyles();

        // ==================== CONFIGURATION API ====================
        const API_PROVIDER = 'groq';
        let GROQ_API_KEY = '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';

        // ==================== VARIABLES GLOBALES ====================
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        let conversationHistory = [];
        let currentScenario = '';
        let currentCharacter = null;

        // ====================== NOUVEAU : ÉTAT DU JEU STRUCTURÉ ======================
        let gameState = {
            location: "Forêt des Rêves Oubliés",
            situation: "Tu viens de te réveiller dans une clairière baignée de brume argentée.",
            enemy: null,
            player: {
                hp: 100,
                maxHp: 100
            },
            inventory: [],
            lastEvent: "Début de l'aventure"
        };

        // ==================== FONCTIONS UTILITAIRES (mises à jour) ====================
        function addMessage(text, isGM) {
            const div = document.createElement('div');
            div.className = `max-w-2xl ${isGM ? 'mr-auto chat-bubble-gm' : 'ml-auto chat-bubble-player'} p-5 rounded-3xl`;
            div.innerHTML = `
                <div style="color:${isGM ? 'var(--col-text-secondary)' : 'var(--col-accent)'}; font-size:0.8rem; margin-bottom:6px;">
                    ${isGM ? '🧙 Maître du Jeu' : '⚔️ Toi'}
                </div>
                <p class="leading-relaxed whitespace-pre-wrap" style="color:#f1f5f9;">${text}</p>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            const loading = document.createElement('div');
            loading.id = 'loading-msg';
            loading.className = 'max-w-2xl mr-auto chat-bubble-gm p-5 rounded-3xl';
            loading.innerHTML = `<p style="color:var(--col-text-secondary); animation: pulse 1.5s infinite;">🧙 Le Maître du Jeu tisse la trame...</p>`;
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return loading;
        }

        // ====================== NOUVEAU : SYNCHRO HP + ANIMATION ====================
        function syncPlayerHP() {
            if (!currentCharacter) return;
            currentCharacter.hp = Math.max(0, gameState.player.hp);
            currentCharacter.maxHp = gameState.player.maxHp || currentCharacter.maxHp;

            const hpBar = document.getElementById('hp-bar');
            const hpText = document.getElementById('hp-text');
            if (hpBar && hpText) {
                const percent = Math.max(0, (currentCharacter.hp / currentCharacter.maxHp) * 100);
                hpBar.style.width = `${percent}%`;
                hpText.textContent = `${currentCharacter.hp} / ${currentCharacter.maxHp}`;

                // Animation flash rouge
                hpBar.style.background = 'linear-gradient(to right, #ef4444, #b91c1c)';
                setTimeout(() => {
                    hpBar.style.background = 'linear-gradient(to right, #f43f5e, #e11d48)';
                }, 400);
            }
            updateMainPageWithCharacter(currentCharacter);
        }

        // ====================== NOUVEAU : CALCUL DÉGÂTS CÔTÉ JS (joueur uniquement) ====================
        function calculatePlayerDamage() {
            if (!currentCharacter) return 12;
            const force = currentCharacter.stats?.force || 10;
            return Math.max(6, Math.floor(force * 1.4 + Math.random() * 11));
        }

        // ====================== NOUVEAU : SAUVEGARDE / CHARGEMENT ====================
        function saveGameState() {
            localStorage.setItem('gameState', JSON.stringify(gameState));
        }

        function loadGameState() {
            const saved = localStorage.getItem('gameState');
            if (saved) {
                gameState = JSON.parse(saved);
            }
            // Synchronisation initiale avec le personnage
            if (currentCharacter && gameState.player) {
                gameState.player.hp = currentCharacter.hp;
                gameState.player.maxHp = currentCharacter.maxHp;
            }
        }

        // ====================== NOUVEAU : AFFICHAGE DES CHOIX DYNAMIQUES ====================
        function renderDynamicChoices(choices) {
            const grid = document.getElementById('quick-actions-grid');
            const title = document.getElementById('choices-title');
            if (!grid) return;

            // Nettoyage
            grid.innerHTML = '';

            // Titre dynamique
            if (title) title.textContent = choices.length > 0 ? 'Choix du Maître du Jeu' : 'Actions rapides';

            if (choices.length === 0) {
                // Fallback rapide (optionnel)
                grid.innerHTML = `
                    <button onclick="quickAction('Explorer autour de moi')" class="p-3 rounded-xl transition" style="background: rgba(30,30,50,0.6); border: 1px solid var(--col-border);">Explorer</button>
                    <button onclick="quickAction('Lancer un sort')" class="p-3 rounded-xl transition" style="background: rgba(30,30,50,0.6); border: 1px solid var(--col-border);">Sort</button>
                `;
                return;
            }

            choices.forEach((choice, i) => {
                const btn = document.createElement('button');
                btn.className = `choice-btn p-4 rounded-2xl text-left text-sm font-medium transition-all hover:scale-105 hover:shadow-md flex items-center gap-2`;
                btn.style.cssText = `background: rgba(30,30,50,0.8); border: 1px solid var(--col-border); animation-delay: ${i * 60}ms;`;
                btn.innerHTML = `
                    <span class="text-lg">➤</span>
                    <span>${choice}</span>
                `;
                btn.onclick = () => handleChoice(choice);
                grid.appendChild(btn);
            });
        }

        // ====================== NOUVEAU : GESTION D'UN CHOIX ====================
        async function handleChoice(choiceText) {
            addMessage(choiceText, false);
            conversationHistory.push({ role: "user", content: choiceText });

            // Combat joueur : dégâts calculés CÔTÉ JS
            const lower = choiceText.toLowerCase();
            if (gameState.enemy && (lower.includes('attaquer') || lower.includes('frapper') || lower.includes('coup') || lower.includes('tuer'))) {
                const damage = calculatePlayerDamage();
                gameState.enemy.hp = Math.max(0, gameState.enemy.hp - damage);

                if (gameState.enemy.hp <= 0) {
                    gameState.enemy = null;
                    gameState.lastEvent = "Ennemi vaincu dans un dernier souffle !";
                }
            }

            userInput.value = '';
            await callGM(); // Le choix est déjà dans l'historique
            saveGameState();
        }

        // ==================== MISE À JOUR PERSONNAGE (inchangée + appel sync) ====================
        function updateMainPageWithCharacter(character) {
            currentCharacter = character;
            const container = document.getElementById('character-info');
            if (!container) return;

            const stats = character.stats || {};
            container.innerHTML = `
                <div class="rounded-3xl p-6" style="background:rgba(15,23,42,0.85); border:2px solid var(--col-border);">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center text-3xl shadow-lg">👤</div>
                        <div>
                            <h2 class="text-2xl font-bold magic-glow">${character.name}</h2>
                            <p class="text-violet-300">${character.race} • ${character.class}</p>
                        </div>
                    </div>
                    <div class="mb-6">
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:#f87171;">❤️ Points de Vie</span>
                            <span id="hp-text" class="font-mono">${character.hp} / ${character.maxHp}</span>
                        </div>
                        <div class="h-3 bg-zinc-900 rounded-full overflow-hidden border border-red-900/50">
                            <div id="hp-bar"
                                 class="h-full bg-gradient-to-r from-red-500 to-rose-600 rounded-full transition-all duration-500"
                                 style="width: ${Math.max(0, (character.hp / character.maxHp) * 100)}%;">
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-[#1e2937] rounded-2xl p-4">
                            <div class="flex items-center gap-2 text-red-400 mb-1">⚔️ FORCE</div>
                            <div class="text-3xl font-bold font-mono">${stats.force || 10}</div>
                        </div>
                        <div class="bg-[#1e2937] rounded-2xl p-4">
                            <div class="flex items-center gap-2 text-blue-400 mb-1">🛡️ DÉFENSE</div>
                            <div class="text-3xl font-bold font-mono">${stats.defense || 10}</div>
                        </div>
                        <div class="bg-[#1e2937] rounded-2xl p-4">
                            <div class="flex items-center gap-2 text-emerald-400 mb-1">🏹 DEXTÉRITÉ</div>
                            <div class="text-3xl font-bold font-mono">${stats.dexterite || 10}</div>
                        </div>
                        <div class="bg-[#1e2937] rounded-2xl p-4">
                            <div class="flex items-center gap-2 text-purple-400 mb-1">✨ INTELLIGENCE</div>
                            <div class="text-3xl font-bold font-mono">${stats.intelligence || 10}</div>
                        </div>
                    </div>
                    ${character.background && character.background !== "Aucun background renseigné" ? `
                    <div class="mt-6 pt-4 border-t border-[var(--col-border)] text-xs leading-relaxed" style="color: var(--col-text-secondary);">
                        ${character.background}
                    </div>` : ''}
                </div>
            `;

            // Init état du jeu au premier personnage
            if (!localStorage.getItem('gameState')) {
                gameState.player.hp = character.hp;
                gameState.player.maxHp = character.maxHp;
                saveGameState();
            }
        }

        // ==================== APPEL À L'IA – VERSION STRUCTURÉE (ULTRA IMPORTANT) ====================
        async function callGM() {
            const loadingDiv = showLoading();

            try {
                // Stats joueur
                let playerStats = currentCharacter ? 
                    `Nom: ${currentCharacter.name}
Race/Classe: ${currentCharacter.race} ${currentCharacter.class}
Force: ${currentCharacter.stats?.force || 10}
Défense: ${currentCharacter.stats?.defense || 10}
Dextérité: ${currentCharacter.stats?.dexterite || 10}
Intelligence: ${currentCharacter.stats?.intelligence || 10}
HP: ${gameState.player.hp}/${gameState.player.maxHp}` : 'Aucun personnage chargé';

                const systemPrompt = `Tu es un Maître du Jeu structuré et implacable pour un jeu de rôle dark fantasy.

**ÉTAT DU MONDE ACTUEL (RESPECTE-LE À LA LETTRE) :**
${JSON.stringify(gameState, null, 2)}

**STATS JOUEUR :**
${playerStats}

**SCÉNARIO :** ${currentScenario || 'Aventure libre en dark fantasy'}

**RÈGLES STRICTES (à respecter sous peine de cohérence brisée) :**
- Tu DOIS rester 100% cohérent avec l'état fourni. Ne jamais inventer de stats, d'HP, d'ennemis ou de lieux.
- Les seuls changements d'état autorisés sont ceux du champ "update".
- Combat : 
  • Dégâts joueur = floor(force × 1.4 + random(0-11)) + 6 (déjà calculés côté JS si le joueur attaque).
  • Dégâts ennemi = floor(10 + random(0-8)) - floor(défense/3).
  • Mets à jour les HP dans "update" avec ces formules.
- Propose toujours 2 à 4 choix clairs, pertinents et immersifs.
- Réponds EXCLUSIVEMENT en JSON valide, sans aucun texte avant/après.

**FORMAT OBLIGATOIRE :**
{
  "narration": "texte immersif, sensoriel, littéraire en français",
  "choices": ["Choix 1", "Choix 2", "Choix 3"],
  "update": {
    "enemy_hp": number | null,
    "player_hp": number | null,
    "new_location": "string" | null,
    "event": "string"
  }
}

Si tu veux créer un nouvel ennemi, mets dans "event" : "new_enemy|Nom|HP|MaxHP" (ex: "new_enemy|Gobelin spectral|28|28").`;

                const messages = conversationHistory.length === 0 
                    ? [{ role: "user", content: "Lance immédiatement l'aventure avec une introduction immersive de 4-5 phrases." }]
                    : conversationHistory;

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: systemPrompt }, ...messages],
                        max_tokens: 1200,
                        temperature: 0.75
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                let rawReply = data.choices?.[0]?.message?.content || '{"narration":"Erreur de connexion au voile...","choices":[],"update":{}}';

                loadingDiv.remove();

                // Parser JSON (tolérance aux fautes LLM)
                let parsed;
                try {
                    const start = rawReply.indexOf('{');
                    const end = rawReply.lastIndexOf('}') + 1;
                    const cleanJson = rawReply.substring(start, end);
                    parsed = JSON.parse(cleanJson);
                } catch (e) {
                    console.error("JSON invalide → fallback texte libre", e);
                    addMessage(rawReply, true);
                    conversationHistory.push({ role: "assistant", content: rawReply });
                    saveGameState();
                    return;
                }

                const { narration, choices = [], update = {} } = parsed;

                // Affichage narration
                addMessage(narration, true);
                conversationHistory.push({ role: "assistant", content: narration });

                // Application stricte de l'update
                if (update.new_location) gameState.location = update.new_location;
                if (update.player_hp !== null && update.player_hp !== undefined) {
                    gameState.player.hp = Math.max(0, update.player_hp);
                    syncPlayerHP();
                }
                if (update.enemy_hp !== null && update.enemy_hp !== undefined) {
                    if (gameState.enemy) {
                        gameState.enemy.hp = Math.max(0, update.enemy_hp);
                        if (gameState.enemy.hp <= 0) gameState.enemy = null;
                    }
                }
                if (update.event) {
                    gameState.lastEvent = update.event;

                    // Gestion spéciale nouvel ennemi (bonus cohérence)
                    if (update.event.startsWith('new_enemy|')) {
                        const parts = update.event.split('|');
                        if (parts.length === 4) {
                            gameState.enemy = {
                                name: parts[1],
                                hp: parseInt(parts[2]),
                                maxHp: parseInt(parts[3])
                            };
                        }
                    }
                }

                // Affichage des choix (avec animation)
                renderDynamicChoices(choices);

                saveGameState();

            } catch (err) {
                console.error(err);
                loadingDiv.remove();
                addMessage("❌ Le voile magique s'est déchiré... Réessaie ou vérifie ta connexion.", true);
            }
        }

        // ==================== FONCTIONS DU JEU (mises à jour) ====================
        async function startNewScenario() {
            const scenarioText = document.getElementById('scenario-input')?.value.trim() || "Aucune description fournie";
            currentScenario = scenarioText;
            conversationHistory = [];
            chatContainer.innerHTML = '';
            loadGameState();

            const savedCharacter = localStorage.getItem('currentCharacter');
            if (savedCharacter) {
                const character = JSON.parse(savedCharacter);
                updateMainPageWithCharacter(character);
            }

            addMessage(`<strong>Personnage créé :</strong> ${scenarioText}`, false);
            await callGM(); // Premier appel → introduction structurée
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, false);
            conversationHistory.push({ role: "user", content: text });
            userInput.value = '';
            await callGM();
            saveGameState();
        }

        // Actions rapides conservées comme fallback
        function quickAction(action) {
            userInput.value = action;
            sendMessage();
        }

        // ==================== INITIALISATION ====================
        window.onload = () => {
            loadGameState();
            addMessage('Bienvenue dans <strong>Magie & Dragons</strong> ✨<br>Crée ton personnage à gauche pour lancer une aventure structurée avec un vrai Maître du Jeu.', true);

            // Si un personnage existe déjà dans le localStorage, on le charge
            const savedCharacter = localStorage.getItem('currentCharacter');
            if (savedCharacter) {
                const character = JSON.parse(savedCharacter);
                updateMainPageWithCharacter(character);
            }
        };

        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

    <!-- Script du modal de création de personnage (inchangé) -->
    <script src="character-creation.js"></script>
</body>
</html>
