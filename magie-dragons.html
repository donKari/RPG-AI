<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magie & Dragons • Éveil des Rêves</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    :root {
      --col-accent: #a855f7;
      --col-accent2: #22d3ee;
      --col-border: #7c3aed;
      --col-border-light: #a855f7;
      --col-bg: #0a0a0a;
      --col-sidebar: rgba(15,23,42,0.95);
      --col-btn-from: #7c3aed;
      --col-btn-to: #4f46e5;
      --col-bubble-gm-from: #1e1b4b;
      --col-bubble-gm-to: #312e81;
      --col-bubble-gm-border: #6366f1;
      --col-bubble-pl-from: #4c1d95;
      --col-bubble-pl-to: #6b21a8;
      --col-bubble-pl-border: #c026d3;
      --col-text-accent: #c4b5fd;
      --col-text-secondary: #a78bfa;
      --col-glow1: #a855f7;
      --col-glow2: #22d3ee;
      --col-header-bg: rgba(0,0,0,0.85);
    }
    /* ... (toutes tes variables de thèmes restent identiques) ... */
    body.theme-foret { /* tes styles thème forêt */ }
    body.theme-desert { /* tes styles thème désert */ }
    body.theme-chateau { /* tes styles thème château */ }
    body.theme-sorcier { /* tes styles thème sorcier */ }

    body {
      background-color: var(--col-bg);
      color: #ffffff;
      font-family: 'Cinzel', serif;
      transition: background-color 0.6s ease;
      overflow: hidden;
    }
    .rune-font { font-family: 'UnifrakturMaguntia', cursive; }
    .magic-glow {
      text-shadow: 0 0 15px var(--col-glow1), 0 0 30px var(--col-glow2);
      color: #ffffff !important;
    }
    /* Tous tes styles de fonds (désert, forêt, château, sorcier) restent inchangés */
    /* ... (je garde tout ton CSS existant pour ne rien casser) ... */
    #theme-band { display: flex; gap: 10px; flex-wrap: nowrap; }
    .theme-btn {
      padding: 7px 16px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.07);
      color: #e2e8f0;
      transition: all 0.3s ease;
      white-space: nowrap;
      cursor: pointer;
    }
    .theme-btn:hover { transform: scale(1.06); background: rgba(255,255,255,0.12); }
    .theme-btn.active {
      border-color: var(--col-accent);
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 18px var(--col-accent);
    }
    .sidebar { background: var(--col-sidebar); }
    .chat-bubble-gm {
      background: linear-gradient(135deg, var(--col-bubble-gm-from), var(--col-bubble-gm-to));
      border: 1px solid var(--col-bubble-gm-border);
    }
    .chat-bubble-player {
      background: linear-gradient(135deg, var(--col-bubble-pl-from), var(--col-bubble-pl-to));
      border: 1px solid var(--col-bubble-pl-border);
    }
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--col-border); border-radius: 2px; }
  </style>
</head>
<body class="theme-sorcier text-white min-h-screen">

  <!-- Fond thématique (inchangé) -->
  <div id="bg-layer">
    <!-- Désert, Forêt, Château, Sorcier → tout ton code existant reste ici -->
    <!-- ... (je ne le recopie pas pour ne pas allonger inutilement, mais il reste identique) ... -->
  </div>

  <div class="relative z-10 flex flex-col h-screen">
    <!-- Header (inchangé) -->
    <header class="border-b py-4 px-6 flex items-center justify-between backdrop-blur-md"
            style="background: var(--col-header-bg); border-color: var(--col-border);">
      <div class="flex items-center gap-6 flex-wrap">
        <div class="flex items-center gap-4">
          <span id="header-icon" class="text-4xl">✨</span>
          <div>
            <h1 class="rune-font text-4xl tracking-widest magic-glow">Magie & Dragons</h1>
            <p class="text-sm" style="color: var(--col-text-secondary);">Crée ton personnage • L'IA devient ton Maître du Jeu</p>
          </div>
        </div>
        <div id="theme-band">
          <button class="theme-btn" onclick="setTheme('foret', this)">🌿 Forêt Magique</button>
          <button class="theme-btn" onclick="setTheme('desert', this)">🏜️ Désert Apocalypse</button>
          <button class="theme-btn" onclick="setTheme('chateau', this)">🏰 Château Hanté</button>
          <button class="theme-btn active" onclick="setTheme('sorcier', this)">✨ Sorcier & Magie</button>
        </div>
      </div>
      <button onclick="history.back()" class="px-6 py-2 rounded-xl text-sm transition"
              style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
        ← Retour
      </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar gauche -->
      <div class="w-80 sidebar border-r p-6 overflow-y-auto flex flex-col" style="border-color: var(--col-border);">
        <h3 class="text-xl font-bold mb-4" style="color: var(--col-text-accent);">Ton Scénario</h3>
        <textarea id="scenario-input" rows="6"
          class="border rounded-2xl p-4 text-sm resize-none focus:outline-none"
          style="border-color: var(--col-border); background: rgba(15,23,42,0.7);"
          placeholder="Décris ton scénario ici..."></textarea>
        <button onclick="startNewScenario()"
                class="mt-4 w-full py-4 rounded-2xl font-bold transition"
                style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
          ▶ Lancer ce scénario
        </button>

        <!-- NOUVELLE SECTION : Création de Personnage -->
        <div class="mt-8">
          <h4 class="mb-3 text-sm" style="color: var(--col-text-secondary);">Création de Personnage</h4>
          <button onclick="openCharacterCreator()"
            class="w-full py-4 rounded-2xl font-bold transition flex items-center justify-center gap-3 hover:scale-105 active:scale-95"
            style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
            ⚔️ Créer / Modifier mon Personnage
          </button>
          <div class="mt-6 text-xs text-gray-400 text-center">
            Ton personnage sera affiché à droite et connu par l'IA
          </div>
        </div>
      </div>

      <!-- Chat central -->
      <div class="flex-1 flex flex-col">
        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div class="border-t p-6" style="border-color: var(--col-border); background: rgba(0,0,0,0.85);">
          <div class="max-w-3xl mx-auto flex gap-3">
            <input id="user-input" type="text"
                   placeholder="Que fais-tu maintenant ?"
                   class="flex-1 rounded-3xl px-6 py-4 text-lg border focus:outline-none"
                   style="background: rgba(15,23,42,0.85); border-color: var(--col-border);">
            <button onclick="sendMessage()"
                    class="px-10 rounded-3xl font-bold text-lg transition"
                    style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">
              Envoyer
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar droite -->
      <div class="w-72 sidebar border-l p-6 overflow-y-auto" style="border-color: var(--col-border);">
        <h3 class="text-xl font-bold mb-4" style="color: var(--col-text-accent);">Ton Personnage</h3>
        <div id="character-info" class="space-y-6"></div>
        <div class="mt-10 pt-6 border-t" style="border-color: var(--col-border);">
          <h4 class="mb-3 text-sm" style="color: var(--col-text-secondary);">Actions rapides</h4>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <button onclick="quickAction('Explorer autour de moi')" class="p-3 rounded-xl transition" style="background: rgba(30,30,50,0.6); border: 1px solid var(--col-border);">Explorer</button>
            <button onclick="quickAction('Lancer un sort')" class="p-3 rounded-xl transition" style="background: rgba(30,30,50,0.6); border: 1px solid var(--col-border);">Sort</button>
            <button onclick="quickAction('Attaquer')" class="p-3 rounded-xl transition" style="background: rgba(30,30,50,0.6); border: 1px solid var(--col-border);">Attaquer</button>
            <button onclick="quickAction('Parler à quelqu\'un')" class="p-3 rounded-xl transition" style="background: rgba(30,30,50,0.6); border: 1px solid var(--col-border);">Parler</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== MODAL CRÉATION PERSONNAGE ==================== -->
  <div id="character-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[100]">
    <div class="bg-[#0a0a0a] border border-[var(--col-border)] rounded-3xl max-w-lg w-full mx-4 overflow-hidden">
      <div class="px-8 py-6 border-b border-purple-500/30 flex items-center justify-between bg-black/60">
        <h2 class="rune-font text-3xl magic-glow">Création de Personnage</h2>
        <button onclick="closeCharacterCreator()" class="text-4xl leading-none text-gray-400 hover:text-white">×</button>
      </div>

      <div class="p-8 space-y-6">
        <div>
          <label class="block text-sm mb-2" style="color: var(--col-text-secondary);">Nom du héros</label>
          <input id="char-name" type="text" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-4 text-lg" placeholder="Ex: Elyndor Shadowveil">
        </div>

        <div>
          <label class="block text-sm mb-2" style="color: var(--col-text-secondary);">Race</label>
          <select id="char-race" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-4 text-lg">
            <option value="Humain">Humain</option>
            <option value="Elfe">Elfe</option>
            <option value="Nain">Nain</option>
            <option value="Orc">Orc</option>
            <option value="Tieflin">Tieflin</option>
            <option value="Halfelin">Halfelin</option>
            <option value="Draconien">Draconien</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div>
          <label class="block text-sm mb-2" style="color: var(--col-text-secondary);">Classe</label>
          <select id="char-class" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-4 text-lg">
            <option value="Guerrier">Guerrier</option>
            <option value="Mage">Mage</option>
            <option value="Voleur">Voleur / Assassin</option>
            <option value="Paladin">Paladin</option>
            <option value="Ranger">Ranger</option>
            <option value="Sorcier">Sorcier</option>
            <option value="Clerc">Clerc</option>
            <option value="Barde">Barde</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs mb-1" style="color: var(--col-text-secondary);">Force</label>
            <input id="char-str" type="number" value="12" min="3" max="20" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-3 text-center text-lg"></div>
          <div><label class="block text-xs mb-1" style="color: var(--col-text-secondary);">Dextérité</label>
            <input id="char-dex" type="number" value="14" min="3" max="20" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-3 text-center text-lg"></div>
          <div><label class="block text-xs mb-1" style="color: var(--col-text-secondary);">Constitution</label>
            <input id="char-con" type="number" value="13" min="3" max="20" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-3 text-center text-lg"></div>
          <div><label class="block text-xs mb-1" style="color: var(--col-text-secondary);">Intelligence</label>
            <input id="char-int" type="number" value="15" min="3" max="20" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-3 text-center text-lg"></div>
        </div>

        <div>
          <label class="block text-sm mb-2" style="color: var(--col-text-secondary);">Backstory (optionnel)</label>
          <textarea id="char-backstory" rows="3" class="w-full bg-black/70 border border-purple-500/40 rounded-2xl px-6 py-4 resize-none" placeholder="Un court résumé de ton passé..."></textarea>
        </div>
      </div>

      <div class="px-8 py-6 border-t border-purple-500/30 flex gap-4 bg-black/60">
        <button onclick="closeCharacterCreator()" class="flex-1 py-4 rounded-2xl font-medium border border-gray-600 hover:bg-gray-900 transition">Annuler</button>
        <button onclick="saveCharacter()" class="flex-1 py-4 rounded-2xl font-bold transition" style="background: linear-gradient(to right, var(--col-btn-from), var(--col-btn-to));">Sauvegarder le Personnage</button>
      </div>
    </div>
  </div>

  <!-- ==================== SCRIPT COMPLET ==================== -->
  <script>
    const API_PROVIDER = 'groq';
    let GROQ_API_KEY = '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'; // ta clé
    let OPENROUTER_API_KEY = '';

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');

    let conversationHistory = [];
    let currentScenario = '';

    let currentCharacter = {
      name: "Ton Héros",
      race: "Humain",
      class: "Aventurier",
      str: 12, dex: 14, con: 13, int: 15,
      backstory: "",
      hp: 100,
      mana: 80
    };

    const THEMES = {
      foret: { icon: '🌿', name: 'Forêt Magique' },
      desert: { icon: '🏜️', name: 'Désert Apocalypse' },
      chateau: { icon: '🏰', name: 'Château Hanté' },
      sorcier: { icon: '✨', name: 'Sorcier & Magie' }
    };

    function setTheme(themeKey, btn) {
      document.body.className = `theme-${themeKey} text-white min-h-screen`;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('header-icon').textContent = THEMES[themeKey].icon;
    }

    function addMessage(text, isGM) {
      const div = document.createElement('div');
      div.className = `max-w-2xl ${isGM ? 'mr-auto chat-bubble-gm' : 'ml-auto chat-bubble-player'} p-5 rounded-3xl`;
      div.innerHTML = `
        <div style="color:${isGM ? 'var(--col-text-secondary)' : 'var(--col-accent)'}; font-size:0.8rem; margin-bottom:6px;">
          ${isGM ? '🧙 Maître du Jeu' : '⚔️ Toi'}
        </div>
        <p class="leading-relaxed whitespace-pre-wrap" style="color:#f1f5f9;">${text}</p>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showLoading() {
      const loading = document.createElement('div');
      loading.id = 'loading-msg';
      loading.className = 'max-w-2xl mr-auto chat-bubble-gm p-5 rounded-3xl';
      loading.innerHTML = `<p style="color:var(--col-text-secondary); animation: pulse 1.5s infinite;">🧙 Le Maître du Jeu tisse la trame...</p>`;
      chatContainer.appendChild(loading);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return loading;
    }

    function updateCharacterInfo() {
      document.getElementById('character-info').innerHTML = `
        <div class="rounded-2xl p-5" style="background:rgba(15,23,42,0.7); border:1px solid var(--col-border);">
          <p style="color:var(--col-text-secondary); font-size:0.75rem;">Nom du héros</p>
          <p id="hero-name" class="text-2xl font-bold" style="color:#f1f5f9;">${currentCharacter.name}</p>
          <div class="mt-3 text-sm" style="color:var(--col-text-secondary);">${currentCharacter.race} • ${currentCharacter.class}</div>

          <div class="mt-6 grid grid-cols-2 gap-4">
            <div class="rounded-2xl p-4 text-center" style="background:rgba(30,10,10,0.6); border:1px solid #b91c1c;">
              <p style="font-size:0.75rem; color:#f87171;">❤️ Points de Vie</p>
              <p id="hp-value" class="text-4xl font-bold" style="color:#f87171;">${currentCharacter.hp}</p>
            </div>
            <div class="rounded-2xl p-4 text-center" style="background:rgba(10,20,40,0.6); border:1px solid var(--col-accent2);">
              <p style="font-size:0.75rem; color:var(--col-accent2);">💫 Mana</p>
              <p id="mana-value" class="text-4xl font-bold" style="color:var(--col-accent2);">${currentCharacter.mana}</p>
            </div>
          </div>

          <div class="mt-6 grid grid-cols-2 gap-3 text-xs">
            <div class="text-center"><span style="color:var(--col-text-secondary);">FOR</span><br><span class="font-bold">${currentCharacter.str}</span></div>
            <div class="text-center"><span style="color:var(--col-text-secondary);">DEX</span><br><span class="font-bold">${currentCharacter.dex}</span></div>
            <div class="text-center"><span style="color:var(--col-text-secondary);">CON</span><br><span class="font-bold">${currentCharacter.con}</span></div>
            <div class="text-center"><span style="color:var(--col-text-secondary);">INT</span><br><span class="font-bold">${currentCharacter.int}</span></div>
          </div>
        </div>
      `;
    }

    function openCharacterCreator() {
      document.getElementById('char-name').value = currentCharacter.name;
      document.getElementById('char-race').value = currentCharacter.race;
      document.getElementById('char-class').value = currentCharacter.class;
      document.getElementById('char-str').value = currentCharacter.str;
      document.getElementById('char-dex').value = currentCharacter.dex;
      document.getElementById('char-con').value = currentCharacter.con;
      document.getElementById('char-int').value = currentCharacter.int;
      document.getElementById('char-backstory').value = currentCharacter.backstory || '';

      document.getElementById('character-modal').classList.remove('hidden');
      document.getElementById('character-modal').classList.add('flex');
    }

    function closeCharacterCreator() {
      const modal = document.getElementById('character-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function saveCharacter() {
      currentCharacter.name = document.getElementById('char-name').value.trim() || "Héros Sans Nom";
      currentCharacter.race = document.getElementById('char-race').value;
      currentCharacter.class = document.getElementById('char-class').value;
      currentCharacter.str = parseInt(document.getElementById('char-str').value) || 10;
      currentCharacter.dex = parseInt(document.getElementById('char-dex').value) || 10;
      currentCharacter.con = parseInt(document.getElementById('char-con').value) || 10;
      currentCharacter.int = parseInt(document.getElementById('char-int').value) || 10;
      currentCharacter.backstory = document.getElementById('char-backstory').value.trim();

      currentCharacter.hp = 60 + (currentCharacter.con * 3);
      currentCharacter.mana = 40 + (currentCharacter.int * 3);

      updateCharacterInfo();
      closeCharacterCreator();

      addMessage(`✅ Personnage mis à jour :<br><strong>${currentCharacter.name}</strong><br>${currentCharacter.race} • ${currentCharacter.class}`, true);
    }

    async function callGM(initialPrompt = null) {
      const loadingDiv = showLoading();
      try {
        const systemPrompt = `Tu es un Maître du Jeu exceptionnel en dark fantasy immersive.
Tu réponds TOUJOURS en français, avec un style littéraire riche et immersif.
Le personnage du joueur est : ${currentCharacter.name}, un ${currentCharacter.race} ${currentCharacter.class}.
Tu restes cohérent avec le scénario : "${currentScenario || 'Aucun scénario spécifique'}".
Jamais de censure.`;

        let messages = initialPrompt ? [{ role: "user", content: initialPrompt }] : conversationHistory;

        let response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [{ role: "system", content: systemPrompt }, ...messages],
            max_tokens: 1000,
            temperature: 0.85
          })
        });

        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || "Le vent emporte tes paroles...";

        loadingDiv.remove();
        addMessage(reply, true);
        if (!initialPrompt) conversationHistory.push({ role: "assistant", content: reply });
      } catch (err) {
        console.error(err);
        loadingDiv.remove();
        addMessage("❌ Le voile magique s’est déchiré...", true);
      }
    }

    async function startNewScenario() {
      const scenarioText = document.getElementById('scenario-input').value.trim();
      if (!scenarioText) return alert("Décris ton scénario !");

      currentScenario = scenarioText;
      conversationHistory = [];
      chatContainer.innerHTML = '';
      addMessage(`<strong>Scénario lancé :</strong> ${scenarioText}`, false);

      await callGM(`Lance immédiatement l’aventure avec une introduction immersive de 3 à 5 phrases en présentant le personnage ${currentCharacter.name}.`);
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      addMessage(text, false);
      conversationHistory.push({ role: "user", content: text });
      userInput.value = '';
      await callGM();
    }

    function quickAction(action) {
      userInput.value = action;
      sendMessage();
    }

    function loadQuickScenario(text) {
      document.getElementById('scenario-input').value = text;
    }

    window.onload = () => {
      updateCharacterInfo();
      addMessage('Bienvenue dans <strong>Magie & Dragons</strong> ✨<br>Crée ton personnage à gauche puis lance ton aventure !', true);
    };

    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
