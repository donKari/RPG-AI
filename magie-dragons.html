<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magie & Dragons • Éveil des Rêves</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       CSS VARIABLES – THEMES
    ══════════════════════════════════════════ */
    :root {
      --col-accent:         #a855f7;
      --col-accent2:        #22d3ee;
      --col-border:         #7c3aed;
      --col-border-light:   #a855f7;
      --col-bg:             #0a0a0a;
      --col-sidebar:        rgba(15,23,42,0.95);
      --col-btn-from:       #7c3aed;
      --col-btn-to:         #4f46e5;
      --col-bubble-gm-from: #1e1b4b;
      --col-bubble-gm-to:   #312e81;
      --col-bubble-gm-brd:  #6366f1;
      --col-bubble-pl-from: #4c1d95;
      --col-bubble-pl-to:   #6b21a8;
      --col-bubble-pl-brd:  #c026d3;
      --col-text-acc:       #c4b5fd;
      --col-text-sec:       #a78bfa;
      --col-glow1:          #a855f7;
      --col-glow2:          #22d3ee;
      --col-header-bg:      rgba(0,0,0,0.82);
    }

    body.theme-foret {
      --col-accent:         #4ade80; --col-accent2:        #86efac;
      --col-border:         #16a34a; --col-border-light:   #4ade80;
      --col-bg:             #020b04; --col-sidebar:        rgba(3,18,8,0.96);
      --col-btn-from:       #15803d; --col-btn-to:         #166534;
      --col-bubble-gm-from: #052e16; --col-bubble-gm-to:   #14532d; --col-bubble-gm-brd: #16a34a;
      --col-bubble-pl-from: #14532d; --col-bubble-pl-to:   #166534; --col-bubble-pl-brd: #4ade80;
      --col-text-acc:       #bbf7d0; --col-text-sec:       #86efac;
      --col-glow1:          #4ade80; --col-glow2:          #a3e635;
      --col-header-bg:      rgba(0,6,2,0.90);
    }
    body.theme-desert {
      --col-accent:         #fb923c; --col-accent2:        #fbbf24;
      --col-border:         #b45309; --col-border-light:   #fb923c;
      --col-bg:             #0f0700; --col-sidebar:        rgba(18,8,0,0.97);
      --col-btn-from:       #b45309; --col-btn-to:         #92400e;
      --col-bubble-gm-from: #1c0f00; --col-bubble-gm-to:   #451a03; --col-bubble-gm-brd: #b45309;
      --col-bubble-pl-from: #451a03; --col-bubble-pl-to:   #78350f; --col-bubble-pl-brd: #fb923c;
      --col-text-acc:       #fed7aa; --col-text-sec:       #fdba74;
      --col-glow1:          #fb923c; --col-glow2:          #fbbf24;
      --col-header-bg:      rgba(10,4,0,0.90);
    }
    body.theme-chateau {
      --col-accent:         #60a5fa; --col-accent2:        #818cf8;
      --col-border:         #1d4ed8; --col-border-light:   #60a5fa;
      --col-bg:             #020408; --col-sidebar:        rgba(2,4,16,0.97);
      --col-btn-from:       #1d4ed8; --col-btn-to:         #1e3a8a;
      --col-bubble-gm-from: #0f172a; --col-bubble-gm-to:   #1e3a8a; --col-bubble-gm-brd: #1d4ed8;
      --col-bubble-pl-from: #1e3a8a; --col-bubble-pl-to:   #1e40af; --col-bubble-pl-brd: #60a5fa;
      --col-text-acc:       #bfdbfe; --col-text-sec:       #93c5fd;
      --col-glow1:          #60a5fa; --col-glow2:          #818cf8;
      --col-header-bg:      rgba(1,2,8,0.92);
    }
    body.theme-sorcier {
      --col-accent:         #e879f9; --col-accent2:        #a855f7;
      --col-border:         #9333ea; --col-border-light:   #e879f9;
      --col-bg:             #0b0010; --col-sidebar:        rgba(10,0,20,0.97);
      --col-btn-from:       #9333ea; --col-btn-to:         #7e22ce;
      --col-bubble-gm-from: #1a0030; --col-bubble-gm-to:   #3b0764; --col-bubble-gm-brd: #9333ea;
      --col-bubble-pl-from: #3b0764; --col-bubble-pl-to:   #581c87; --col-bubble-pl-brd: #e879f9;
      --col-text-acc:       #f5d0fe; --col-text-sec:       #d946ef;
      --col-glow1:          #e879f9; --col-glow2:          #a855f7;
      --col-header-bg:      rgba(5,0,12,0.92);
    }

    /* ══════════════════════════════════════════
       BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Cinzel', serif;
      background-color: var(--col-bg);
      color: #fff;
      transition: background-color 0.6s;
      overflow: hidden;
    }
    .rune-font { font-family: 'UnifrakturMaguntia', cursive; }
    .magic-glow {
      text-shadow: 0 0 14px var(--col-glow1), 0 0 32px var(--col-glow2);
      transition: text-shadow 0.5s;
    }

    /* ══════════════════════════════════════════
       BACKGROUND CANVAS (fixed, z-0)
    ══════════════════════════════════════════ */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    /* Each themed layer hidden by default */
    .bg-layer { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; }
    .bg-layer.active { opacity: 1; }

    /* ── FORÊT ─────────────────────────────── */
    #bg-foret {
      background: radial-gradient(ellipse at 50% 0%, #0a3d1a 0%, #03260d 40%, #020b04 100%);
    }
    /* God rays */
    #bg-foret::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(170deg, rgba(74,222,128,0.07) 0%, transparent 60%),
        linear-gradient(190deg, rgba(163,230,53,0.05) 0%, transparent 50%);
    }
    /* Brume basse */
    #bg-foret::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 35%;
      background: linear-gradient(to top, rgba(34,197,94,0.12), transparent);
      animation: mistFloat 8s ease-in-out infinite alternate;
    }
    .foret-ray {
      position: absolute;
      top: -10%;
      width: 3px;
      height: 120%;
      background: linear-gradient(to bottom, rgba(134,239,172,0.18), transparent 70%);
      filter: blur(6px);
      transform-origin: top center;
    }
    .foret-ray:nth-child(1)  { left: 12%; transform: rotate(8deg);  animation: rayPulse 7s  ease-in-out infinite alternate; }
    .foret-ray:nth-child(2)  { left: 28%; transform: rotate(-5deg); animation: rayPulse 9s  ease-in-out infinite alternate 1s; }
    .foret-ray:nth-child(3)  { left: 47%; transform: rotate(3deg);  animation: rayPulse 11s ease-in-out infinite alternate 2s; }
    .foret-ray:nth-child(4)  { left: 65%; transform: rotate(-8deg); animation: rayPulse 8s  ease-in-out infinite alternate 0.5s; }
    .foret-ray:nth-child(5)  { left: 82%; transform: rotate(6deg);  animation: rayPulse 10s ease-in-out infinite alternate 1.5s; }
    @keyframes rayPulse { from { opacity: 0.4; } to { opacity: 1; } }
    @keyframes mistFloat { from { transform: scaleX(1);   opacity: 0.7; }
                            to   { transform: scaleX(1.05); opacity: 1;   } }

    /* Feuilles tombantes */
    .leaf {
      position: absolute;
      top: -30px;
      font-size: 16px;
      animation: leafFall linear infinite;
      filter: drop-shadow(0 0 4px rgba(74,222,128,0.6));
      opacity: 0.85;
    }
    @keyframes leafFall {
      0%   { transform: translateY(0) translateX(0) rotate(0deg);   opacity: 0.9; }
      50%  { transform: translateY(50vh) translateX(60px) rotate(180deg); }
      100% { transform: translateY(110vh) translateX(-20px) rotate(360deg); opacity: 0; }
    }

    /* ── DÉSERT ────────────────────────────── */
    #bg-desert {
      background: linear-gradient(180deg,
        #1a0800 0%, #3d1500 25%, #7c3200 55%, #c86b00 80%, #e88c00 100%);
    }
    /* Haze overlay */
    #bg-desert::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(251,146,60,0.18) 0%, transparent 70%);
      animation: hazeBreath 6s ease-in-out infinite alternate;
    }
    @keyframes hazeBreath {
      from { opacity: 0.7; transform: scaleY(1); }
      to   { opacity: 1;   transform: scaleY(1.03); }
    }
    /* Dunes */
    .dune {
      position: absolute;
      bottom: 0;
      left: -10%;
      width: 120%;
      border-radius: 50% 50% 0 0 / 80px 80px 0 0;
    }
    .dune-1 {
      height: 140px;
      background: linear-gradient(180deg, #c86010 0%, #7c3200 100%);
      animation: duneShift 18s linear infinite;
      opacity: 0.95;
    }
    .dune-2 {
      height: 100px;
      background: linear-gradient(180deg, #e87c20 0%, #9a4500 100%);
      animation: duneShift 24s linear infinite reverse;
      opacity: 0.85;
    }
    .dune-3 {
      height: 65px;
      background: linear-gradient(180deg, #fb9a38 0%, #c86010 100%);
      animation: duneShift 12s linear infinite;
      opacity: 0.9;
    }
    @keyframes duneShift {
      0%   { transform: translateX(0); }
      100% { transform: translateX(8%); }
    }
    /* Vent / sable */
    .sand-wind {
      position: absolute;
      left: -100%;
      width: 200%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(251,191,36,0.35) 40%, rgba(251,191,36,0.6) 60%, transparent 100%);
      animation: windBlow linear infinite;
    }
    @keyframes windBlow {
      from { transform: translateX(-50%); }
      to   { transform: translateX(50%); }
    }

    /* ── CHÂTEAU ───────────────────────────── */
    #bg-chateau {
      background: linear-gradient(180deg, #000208 0%, #020c1f 40%, #04122e 80%, #050a1a 100%);
    }
    /* Pierre texture simulée */
    #bg-chateau::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(30,58,138,0.06) 38px, rgba(30,58,138,0.06) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 58px, rgba(30,58,138,0.04) 58px, rgba(30,58,138,0.04) 60px);
    }
    /* Éclair */
    .lightning {
      position: absolute;
      inset: 0;
      background: rgba(148,163,250,0.08);
      animation: lightningFlash ease-out infinite;
      pointer-events: none;
    }
    .lightning:nth-child(1) { animation-duration: 9s;  animation-delay: 0s; }
    .lightning:nth-child(2) { animation-duration: 13s; animation-delay: 4s; }
    .lightning:nth-child(3) { animation-duration: 17s; animation-delay: 8s; }
    @keyframes lightningFlash {
      0%, 88%, 90%, 92%, 100% { opacity: 0; }
      89%, 91%                { opacity: 1; }
    }
    /* Brume horizontale */
    .mist {
      position: absolute;
      left: -20%;
      width: 140%;
      background: linear-gradient(90deg, transparent, rgba(96,165,250,0.08), rgba(129,140,248,0.12), transparent);
      filter: blur(18px);
      border-radius: 50%;
      animation: mistDrift linear infinite alternate;
    }
    @keyframes mistDrift {
      from { transform: translateX(-8%); opacity: 0.5; }
      to   { transform: translateX(8%);  opacity: 1;   }
    }

    /* ── SORCIER ───────────────────────────── */
    #bg-sorcier {
      background: radial-gradient(ellipse at 50% 50%, #2d0050 0%, #1a0030 40%, #0b0010 100%);
    }
    /* Aura pulsante */
    #bg-sorcier::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(232,121,249,0.14) 0%, transparent 60%);
      animation: auraPulse 4s ease-in-out infinite alternate;
    }
    @keyframes auraPulse {
      from { transform: scale(1);    opacity: 0.6; }
      to   { transform: scale(1.08); opacity: 1;   }
    }
    /* Cercle magique */
    .magic-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(232,121,249,0.2);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: ringRotate linear infinite;
    }
    .magic-ring:nth-child(1) { width: 500px; height: 500px; animation-duration: 40s; border-color: rgba(168,85,247,0.15); }
    .magic-ring:nth-child(2) { width: 340px; height: 340px; animation-duration: 25s; animation-direction: reverse; }
    .magic-ring:nth-child(3) { width: 200px; height: 200px; animation-duration: 16s; border-color: rgba(232,121,249,0.3); }
    @keyframes ringRotate {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }
    /* Étincelles */
    .spark {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,121,249,0.9) 0%, transparent 70%);
      animation: sparkLife ease-in-out infinite;
    }
    @keyframes sparkLife {
      0%   { opacity: 0; transform: scale(0.5); }
      40%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(0.3) translateY(-30px); }
    }
    /* Flux d'énergie */
    .energy-flow {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(232,121,249,0.4), transparent);
      filter: blur(2px);
      border-radius: 2px;
      animation: flowDrift ease-in-out infinite;
    }
    @keyframes flowDrift {
      0%   { transform: translateX(-30%) scaleX(0.6); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: translateX(30%) scaleX(1.4); opacity: 0; }
    }

    /* ══════════════════════════════════════════
       UI LAYOUT
    ══════════════════════════════════════════ */
    #app { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; }

    /* Theme band */
    #theme-band {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
    }
    .theme-btn {
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      white-space: nowrap;
      font-family: 'Cinzel', serif;
    }
    .theme-btn:hover  { transform: scale(1.07); background: rgba(255,255,255,0.12); }
    .theme-btn.active { border-color: var(--col-accent); background: rgba(255,255,255,0.15); box-shadow: 0 0 14px var(--col-glow1); color: #fff; }

    header {
      background: var(--col-header-bg);
      border-bottom: 1px solid var(--col-border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      transition: background 0.5s, border-color 0.5s;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .header-title { display: flex; align-items: center; gap: 12px; }

    .sidebar {
      width: 288px;
      background: var(--col-sidebar);
      border-color: var(--col-border);
      padding: 20px;
      overflow-y: auto;
      flex-shrink: 0;
      transition: background 0.5s, border-color 0.5s;
    }
    .sidebar-left  { border-right-width: 1px; border-style: solid; }
    .sidebar-right { border-left-width: 1px;  border-style: solid; }

    .body-row { display: flex; flex: 1; overflow: hidden; }
    .chat-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: #0f172a;
      background-image:
        linear-gradient(rgba(51,65,85,0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(51,65,85,0.35) 1px, transparent 1px);
      background-size: 30px 30px;
      scrollbar-width: thin;
      scrollbar-color: var(--col-border) #1e2937;
    }

    .chat-input-row {
      background: rgba(0,0,0,0.95);
      border-top: 1px solid var(--col-border);
      padding: 16px 20px;
      transition: border-color 0.5s;
    }
    .chat-input-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: rgba(15,23,42,0.92);
      border: 1px solid var(--col-border);
      border-radius: 9999px;
      padding: 12px 24px;
      font-size: 1rem;
      color: #fff;
      font-family: 'Cinzel', serif;
      transition: border-color 0.5s;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--col-border-light); }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }

    textarea {
      width: 100%;
      background: rgba(15,23,42,0.9);
      border: 1px solid var(--col-border);
      border-radius: 12px;
      padding: 14px;
      font-size: 0.82rem;
      color: #fff;
      font-family: 'Cinzel', serif;
      resize: none;
      outline: none;
      transition: border-color 0.5s;
    }
    textarea:focus { border-color: var(--col-border-light); }

    .dyn-btn {
      background: linear-gradient(135deg, var(--col-btn-from), var(--col-btn-to));
      border: none;
      color: #fff;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      transition: filter 0.2s, background 0.5s;
      border-radius: 9999px;
      padding: 12px 28px;
    }
    .dyn-btn:hover { filter: brightness(1.18); }
    .dyn-btn-block { border-radius: 16px; width: 100%; padding: 14px; font-size: 0.9rem; margin-top: 12px; }

    .chat-bubble {
      max-width: 580px;
      padding: 16px 20px;
      border-radius: 24px;
      line-height: 1.6;
      font-size: 0.9rem;
    }
    .chat-bubble-gm {
      align-self: flex-start;
      background: linear-gradient(145deg, var(--col-bubble-gm-from), var(--col-bubble-gm-to));
      border: 2px solid var(--col-bubble-gm-brd);
      box-shadow: 0 0 22px rgba(99,102,241,0.2);
      transition: background 0.5s, border-color 0.5s;
    }
    .chat-bubble-player {
      align-self: flex-end;
      background: linear-gradient(145deg, var(--col-bubble-pl-from), var(--col-bubble-pl-to));
      border: 2px solid var(--col-bubble-pl-brd);
      transition: background 0.5s, border-color 0.5s;
    }
    .bubble-label { font-size: 0.68rem; margin-bottom: 4px; opacity: 0.8; }

    .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .qa-btn {
      background: rgba(20,20,40,0.8);
      border: 1px solid var(--col-border);
      border-radius: 12px;
      padding: 10px;
      font-size: 0.78rem;
      font-family: 'Cinzel', serif;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s, border-color 0.5s;
    }
    .qa-btn:hover { background: rgba(50,50,90,0.9); }

    .quick-scenario-btn {
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-family: 'Cinzel', serif;
      color: #fff;
      cursor: pointer;
      background: rgba(20,20,40,0.8);
      border: 1px solid var(--col-border);
      transition: background 0.3s, border-color 0.5s;
    }
    .quick-scenario-btn:hover { background: rgba(50,50,90,0.9); }

    .char-card {
      background: rgba(15,23,42,0.85);
      border: 1px solid var(--col-border);
      border-radius: 16px;
      padding: 16px;
      transition: border-color 0.5s;
    }
    .stat-card {
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }

    .divider { border-top: 1px solid var(--col-border); margin: 24px 0 16px; transition: border-color 0.5s; }

    .sec-label { font-size: 0.7rem; color: var(--col-text-sec); margin-bottom: 6px; display: block; transition: color 0.5s; }
    .acc-text   { color: var(--col-text-acc); transition: color 0.5s; }

    /* back btn */
    .back-btn {
      padding: 8px 18px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--col-btn-from), var(--col-btn-to));
      border: none;
      transition: filter 0.2s, background 0.5s;
    }
    .back-btn:hover { filter: brightness(1.15); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e2937; }
    ::-webkit-scrollbar-thumb { background: var(--col-border); border-radius: 3px; }
  </style>
</head>
<body class="theme-foret">

  <!-- ═══ BACKGROUND CANVAS ═══ -->
  <div id="bg-canvas">

    <!-- FORÊT -->
    <div class="bg-layer active" id="bg-foret">
      <div class="foret-ray"></div>
      <div class="foret-ray"></div>
      <div class="foret-ray"></div>
      <div class="foret-ray"></div>
      <div class="foret-ray"></div>
      <!-- Feuilles générées par JS -->
    </div>

    <!-- DÉSERT -->
    <div class="bg-layer" id="bg-desert">
      <div class="dune dune-1" style="bottom:0"></div>
      <div class="dune dune-2" style="bottom:0"></div>
      <div class="dune dune-3" style="bottom:0"></div>
      <!-- Vents de sable générés par JS -->
    </div>

    <!-- CHÂTEAU -->
    <div class="bg-layer" id="bg-chateau">
      <div class="lightning"></div>
      <div class="lightning"></div>
      <div class="lightning"></div>
      <!-- Brumes générées par JS -->
    </div>

    <!-- SORCIER -->
    <div class="bg-layer" id="bg-sorcier">
      <div class="magic-ring"></div>
      <div class="magic-ring"></div>
      <div class="magic-ring"></div>
      <!-- Étincelles et flux générés par JS -->
    </div>
  </div>

  <!-- ═══ APP ═══ -->
  <div id="app">

    <!-- HEADER -->
    <header>
      <div class="header-left">
        <div class="header-title">
          <span id="header-icon" style="font-size:2rem;">🌿</span>
          <div>
            <h1 class="rune-font magic-glow" style="font-size:2rem; letter-spacing:0.12em;">Magie & Dragons</h1>
            <p class="sec-label" style="margin:0;">Crée ton scénario • L'IA devient ton Maître du Jeu</p>
          </div>
        </div>
        <!-- Boutons thèmes DANS le header -->
        <div id="theme-band">
          <button class="theme-btn active" onclick="setTheme('foret',this)">🌿 Forêt Magique</button>
          <button class="theme-btn"        onclick="setTheme('desert',this)">🏜️ Désert</button>
          <button class="theme-btn"        onclick="setTheme('chateau',this)">🏰 Château Hanté</button>
          <button class="theme-btn"        onclick="setTheme('sorcier',this)">✨ Sorcier & Magie</button>
        </div>
      </div>
      <button class="back-btn" onclick="window.location.href='index.html'">← Retour à l'accueil</button>
    </header>

    <!-- BODY ROW -->
    <div class="body-row">

      <!-- SIDEBAR GAUCHE -->
      <div class="sidebar sidebar-left" style="width:300px;">
        <span class="sec-label" style="font-size:0.9rem; font-weight:700;">Ton Scénario</span>
        <textarea id="scenario-input" rows="6"
          placeholder="Décris ton scénario ou ton personnage ici...&#10;Exemple : Je suis une sorcière des ombres qui entre dans une forêt hantée..."></textarea>
        <button class="dyn-btn dyn-btn-block" onclick="startNewScenario()">Lancer ce scénario</button>

        <div class="divider"></div>
        <span class="sec-label">Scénarios rapides</span>
        <div style="display:flex; flex-direction:column; gap:8px;">
          <button class="quick-scenario-btn" onclick="loadQuickScenario('Je suis un guerrier qui affronte un dragon dans une montagne enneigée')">🐉 Combat contre un dragon</button>
          <button class="quick-scenario-btn" onclick="loadQuickScenario('Je suis un voleur qui explore les ruines d\'une ancienne cité elfique')">🏛️ Ruines elfiques</button>
          <button class="quick-scenario-btn" onclick="loadQuickScenario('Je suis un apprenti sorcier dans une académie de magie où un traître se cache')">🏫 Académie de magie</button>
        </div>
      </div>

      <!-- CHAT -->
      <div class="chat-col">
        <div id="chat-container"></div>
        <div class="chat-input-row">
          <div class="chat-input-inner">
            <input id="user-input" type="text" placeholder="Que fais-tu maintenant ?">
            <button class="dyn-btn" onclick="sendMessage()">Envoyer</button>
          </div>
        </div>
      </div>

      <!-- SIDEBAR DROITE -->
      <div class="sidebar sidebar-right" style="width:260px;">
        <span class="sec-label" style="font-size:0.9rem; font-weight:700;">Ton Personnage</span>
        <div id="character-info" style="display:flex; flex-direction:column; gap:14px;"></div>

        <div class="divider"></div>
        <span class="sec-label">Actions rapides</span>
        <div class="qa-grid">
          <button class="qa-btn" onclick="quickAction('Explorer autour de moi')">Explorer</button>
          <button class="qa-btn" onclick="quickAction('Lancer un sort')">Lancer un sort</button>
          <button class="qa-btn" onclick="quickAction('Attaquer')">Attaquer</button>
          <button class="qa-btn" onclick="quickAction('Parler à quelqu\'un')">Parler</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════
       THEME DATA
    ══════════════════════════════════════════ */
    const THEMES = {
      foret:   { bodyClass: 'theme-foret',   icon: '🌿',  bgId: 'bg-foret'   },
      desert:  { bodyClass: 'theme-desert',  icon: '☀️',  bgId: 'bg-desert'  },
      chateau: { bodyClass: 'theme-chateau', icon: '🏰',  bgId: 'bg-chateau' },
      sorcier: { bodyClass: 'theme-sorcier', icon: '🔮',  bgId: 'bg-sorcier' }
    };
    let currentTheme = 'foret';

    /* ══════════════════════════════════════════
       BUILD DYNAMIC BG ELEMENTS
    ══════════════════════════════════════════ */
    function buildForetLeaves() {
      const container = document.getElementById('bg-foret');
      const leaves = ['🍃','🍀','🌿','🍂'];
      for (let i = 0; i < 22; i++) {
        const el = document.createElement('span');
        el.className = 'leaf';
        el.textContent = leaves[Math.floor(Math.random() * leaves.length)];
        el.style.left        = Math.random() * 100 + '%';
        el.style.fontSize    = (10 + Math.random() * 14) + 'px';
        el.style.animationDuration  = (8 + Math.random() * 16) + 's';
        el.style.animationDelay     = (-Math.random() * 18) + 's';
        el.style.opacity     = 0.5 + Math.random() * 0.5;
        container.appendChild(el);
      }
    }

    function buildDesertWind() {
      const container = document.getElementById('bg-desert');
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'sand-wind';
        el.style.top             = (10 + Math.random() * 80) + '%';
        el.style.height          = (Math.random() < 0.5 ? '1px' : '2px');
        el.style.opacity         = 0.2 + Math.random() * 0.5;
        el.style.animationDuration  = (3 + Math.random() * 5) + 's';
        el.style.animationDelay     = (-Math.random() * 6) + 's';
        container.appendChild(el);
      }
    }

    function buildChateauMist() {
      const container = document.getElementById('bg-chateau');
      const positions = [15, 35, 55, 75];
      positions.forEach((pct, i) => {
        const el = document.createElement('div');
        el.className = 'mist';
        el.style.bottom          = pct + '%';
        el.style.height          = (30 + Math.random() * 50) + 'px';
        el.style.opacity         = 0.4 + Math.random() * 0.4;
        el.style.animationDuration  = (12 + i * 5) + 's';
        el.style.animationDelay     = (-Math.random() * 10) + 's';
        container.appendChild(el);
      });
    }

    function buildSorcierElements() {
      const container = document.getElementById('bg-sorcier');
      // Étincelles
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'spark';
        const size = 3 + Math.random() * 8;
        el.style.width           = size + 'px';
        el.style.height          = size + 'px';
        el.style.left            = Math.random() * 100 + '%';
        el.style.top             = Math.random() * 100 + '%';
        el.style.animationDuration  = (2 + Math.random() * 5) + 's';
        el.style.animationDelay     = (-Math.random() * 6) + 's';
        container.appendChild(el);
      }
      // Flux
      for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.className = 'energy-flow';
        el.style.width           = (100 + Math.random() * 200) + 'px';
        el.style.left            = Math.random() * 100 + '%';
        el.style.top             = Math.random() * 100 + '%';
        el.style.animationDuration  = (4 + Math.random() * 8) + 's';
        el.style.animationDelay     = (-Math.random() * 8) + 's';
        container.appendChild(el);
      }
    }

    /* ══════════════════════════════════════════
       THEME SWITCHER
    ══════════════════════════════════════════ */
    function setTheme(key, btn) {
      const cfg = THEMES[key];
      if (!cfg) return;

      // Body class
      document.body.className = cfg.bodyClass;
      currentTheme = key;

      // Icon
      document.getElementById('header-icon').textContent = cfg.icon;

      // Active btn
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // BG layers
      document.querySelectorAll('.bg-layer').forEach(l => l.classList.remove('active'));
      document.getElementById(cfg.bgId).classList.add('active');

      // Refresh char card (colors updated via CSS vars)
      updateCharacterInfo(lastCharName, lastCharClass);
    }

    /* ══════════════════════════════════════════
       CHAT
    ══════════════════════════════════════════ */
    const chatContainer = document.getElementById('chat-container');
    const userInput     = document.getElementById('user-input');
    let currentScenario = '';
    let lastCharName    = 'Aventurier';
    let lastCharClass   = 'Inconnu';

    function addMessage(text, isGM) {
      const div = document.createElement('div');
      div.className = `chat-bubble ${isGM ? 'chat-bubble-gm' : 'chat-bubble-player'}`;
      div.innerHTML = `
        <div class="bubble-label" style="color:${isGM ? 'var(--col-text-sec)' : 'var(--col-accent)'}">
          ${isGM ? '🧙 Maître du Jeu' : '⚔️ Toi'}
        </div>
        <p>${text}</p>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function updateCharacterInfo(name = 'Aventurier', cls = 'Inconnu') {
      lastCharName  = name;
      lastCharClass = cls;
      document.getElementById('character-info').innerHTML = `
        <div class="char-card">
          <span class="sec-label">Nom</span>
          <p style="font-size:1.2rem; font-weight:700;">${name}</p>
          <span class="sec-label" style="margin-top:10px;">Classe</span>
          <p style="font-size:1rem;">${cls}</p>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div class="stat-card" style="background:rgba(30,8,8,0.7); border:1px solid #b91c1c;">
            <p style="font-size:0.65rem; color:#f87171;">Vie</p>
            <p style="font-size:1.5rem; font-weight:700; color:#f87171;">100</p>
          </div>
          <div class="stat-card" style="background:rgba(8,16,36,0.7); border:1px solid var(--col-border);">
            <p style="font-size:0.65rem; color:var(--col-accent2);">Mana</p>
            <p style="font-size:1.5rem; font-weight:700; color:var(--col-accent2);">80</p>
          </div>
        </div>`;
    }

    function startNewScenario() {
      const scenario = document.getElementById('scenario-input').value.trim();
      if (!scenario) { alert('Décris ton scénario dans la zone de gauche !'); return; }
      currentScenario = scenario;
      chatContainer.innerHTML = '';
      updateCharacterInfo('Ton héros', 'Personnalisé');
      addMessage('Le royaume d\'Elyndor t\'écoute...', true);
      addMessage(`Scénario chargé : <strong>${scenario}</strong>`, true);
      addMessage('Que fais-tu en premier ?', true);
    }

    function loadQuickScenario(text) {
      document.getElementById('scenario-input').value = text;
      startNewScenario();
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      addMessage(text, false);
      userInput.value = '';
      setTimeout(() => addMessage('L\'IA génère la suite de ton histoire en fonction de ton scénario...', true), 700);
    }

    function quickAction(action) {
      addMessage(action, false);
      setTimeout(() => addMessage(`Tu décides de ${action.toLowerCase()}. La suite dépend de ton scénario...`, true), 600);
    }

    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    /* ══════════════════════════════════════════
       INIT
    ══════════════════════════════════════════ */
    buildForetLeaves();
    buildDesertWind();
    buildChateauMist();
    buildSorcierElements();

    updateCharacterInfo();
    addMessage('Bienvenue dans Magie & Dragons !', true);
    addMessage('Choisis un thème en haut à droite pour changer l\'ambiance de ta quête.', true);
  </script>
</body>
</html>
